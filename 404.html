<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Nestwell</title>
  <meta name="description" content="The page you're looking for doesn't exist." />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml" />
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header class="site-header site-header--checkout" id="site-header">
    <div class="container site-header__inner">
      <a href="index.html" class="site-header__logo" aria-label="Nestwell — home">Nestwell</a>
    </div>
  </header>

  <main id="main-content">
    <div class="container">
      <div class="not-found-panel">
        <p class="not-found-panel__code" aria-hidden="true">404</p>
        <h1 class="not-found-panel__heading">Page not found</h1>
        <p class="not-found-panel__text">The page you're looking for doesn't exist or has been moved. Try heading back to the homepage or browsing our shop.</p>
        <div class="not-found-panel__actions">
          <a href="index.html" class="btn btn--primary btn--lg">Go to homepage</a>
          <a href="shop.html" class="btn btn--secondary btn--lg">Browse the shop</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__bottom">
      <p>&copy; <span id="current-year">2026</span> Nestwell. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/modules/storage.js"></script>
  <script src="js/modules/toast.js"></script>
  <script src="js/modules/cart.js"></script>
  <script src="js/modules/wishlist.js"></script>
  <script src="js/modules/product-render.js"></script>
  <script src="js/modules/nav.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
